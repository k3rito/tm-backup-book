name: Telegram R2 Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: telegram-r2-backup
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      API_ID: 35659418
      API_HASH: 1d63b20e1c97871cac416d740eb26a0e
      CHANNEL_USERNAME: cafebook7
      R2_ENDPOINT: https://f49a970ce983f19a7081c30845a3ecc7.r2.cloudflarestorage.com
      R2_BUCKET: tm-backup-book
      R2_ACCESS_KEY: d074b246b93ec0398019572215025267
      R2_SECRET_KEY: 2730781328a0f509ff77aa7c27f0f439e8f840c6e8f9936a79bcae2708f7ef56
      MAX_CONCURRENT_UPLOADS: 2
      TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING || secrets.TELEGRAM_STRING_SESSION || vars.TELEGRAM_SESSION_STRING || vars.TELEGRAM_STRING_SESSION }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backup job
        run: python src/main.py
